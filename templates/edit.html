<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tour bearbeiten</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css">

    <style>
        body { background: #f5f7fa; }
        .box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="container py-4">

<a href="/tour/{{ tour_id }}" class="btn btn-secondary mb-3">← Zurück</a>

<h1>Tour bearbeiten</h1>

<div class="box">
<form method="post">

    <div class="mb-3">
        <label class="form-label">Name</label>
        <input name="name" value="{{ name }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Tags (Kommagetrennt)</label>
        <input name="tags" value="{{ tags }}" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">Speichern</button>
</form>
</div>

</body>
</html>
