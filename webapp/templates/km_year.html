<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>MyBikeLog – km/Jahr</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        #pageContent {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 16px 40px;
        }

        .page-title {
            font-size: 1.5em;
            color: #1f4e8c;
            font-weight: 700;
            margin-bottom: 1.4em;
        }

        /* ── Chart-Block ── */
        .year-block {
            margin-bottom: 0;
        }

        .year-label {
            font-size: 0.85em;
            font-weight: 600;
            color: #1f4e8c;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .bars-row {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 6px;
            align-items: flex-end;
            height: 160px;
        }

        .bar-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
        }

        .bar-fill {
            width: 100%;
            border-radius: 4px 4px 0 0;
            min-height: 2px;
            transition: height 0.6s cubic-bezier(.22,.68,0,1.2);
            position: relative;
        }

        .bar-fill.current {
            background: #1f4e8c;
        }

        .bar-fill.prev {
            background: #7fa8d4;
        }

        .bar-fill.future {
            background: #dde8f4;
        }

        .bar-km {
            font-size: 0.68em;
            color: #555;
            margin-top: 3px;
            text-align: center;
            white-space: nowrap;
        }

        /* ── Differenz-Zeile ── */
        .diff-row {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 6px;
            margin: 8px 0;
        }

        .diff-cell {
            text-align: center;
            font-size: 0.75em;
            font-weight: 700;
            padding: 3px 2px;
            border-radius: 4px;
            line-height: 1.3;
        }

        .diff-cell.positive {
            color: #1a7a3c;
            background: #e6f4ec;
        }

        .diff-cell.negative {
            color: #c0392b;
            background: #fdecea;
        }

        .diff-cell.zero {
            color: #aaa;
        }

        /* ── Monatsbezeichnungen ── */
        .month-labels {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 6px;
            margin-top: 6px;
        }

        .month-label {
            text-align: center;
            font-size: 0.75em;
            color: #888;
            font-weight: 500;
        }

        /* ── Legende ── */
        .legend {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
            font-size: 0.85em;
            color: #555;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        /* ── Jahres-Summen ── */
        .year-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .year-total {
            font-size: 0.82em;
            color: #888;
        }

        .year-total strong {
            color: #1f4e8c;
            font-size: 1.1em;
        }

        .loading {
            color: #aaa;
            font-size: 0.95em;
            padding: 40px 0;
        }
    </style>
</head>
<body>

<div id="MainMenuDashboard">
    <button onclick="window.location.href='{{ url_for('pages.index') }}'">← Dashboard</button>
</div>

<div id="pageContent">

    <div class="page-title">km/Jahr – Monatsvergleich</div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background:#1f4e8c;"></div>
            <span id="legendCurrent">Aktuelles Jahr</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#7fa8d4;"></div>
            <span id="legendPrev">Vorjahr</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#dde8f4;"></div>
            <span>Noch ausstehend</span>
        </div>
    </div>

    <div id="chartContainer">
        <div class="loading">Lade Daten…</div>
    </div>

</div>

<script>
const MONTHS = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];

async function loadData() {
    const resp = await fetch("/api/stats/monthly-comparison");
    if (!resp.ok) throw new Error("API-Fehler");
    return await resp.json();
}

function buildChart(data) {
    const { year_current, year_prev, current, prev, current_month } = data;

    const maxKm = Math.max(...current, ...prev, 1);

    // Jahressummen
    const sumCurrent = current.reduce((a, b) => a + b, 0);
    const sumPrev    = prev.reduce((a, b) => a + b, 0);

    document.getElementById("legendCurrent").textContent = year_current;
    document.getElementById("legendPrev").textContent    = year_prev;

    let html = "";

    // ── Aktuelles Jahr ──
    html += `<div class="year-block">`;
    html += `<div class="year-summary">
        <div class="year-label">${year_current}</div>
        <div class="year-total">Gesamt: <strong>${sumCurrent.toFixed(0)} km</strong></div>
    </div>`;
    html += `<div class="bars-row">`;
    for (let i = 0; i < 12; i++) {
        const km = current[i];
        const isFuture = (i + 1) > current_month;
        const heightPct = isFuture ? 0 : (km / maxKm * 100);
        const cls = isFuture ? "future" : "current";
        const label = (km > 0 && !isFuture) ? `${km.toFixed(0)}` : "";
        html += `<div class="bar-col">
            <div class="bar-fill ${cls}" style="height:${heightPct}%;" title="${MONTHS[i]}: ${km} km"></div>
            <div class="bar-km">${label}</div>
        </div>`;
    }
    html += `</div></div>`;

    // ── Differenz-Zeile ──
    html += `<div class="diff-row">`;
    for (let i = 0; i < 12; i++) {
        const isFuture = (i + 1) > current_month;
        if (isFuture) {
            html += `<div class="diff-cell zero">–</div>`;
            continue;
        }
        const diff = current[i] - prev[i];
        if (diff === 0) {
            html += `<div class="diff-cell zero">±0</div>`;
        } else if (diff > 0) {
            html += `<div class="diff-cell positive">+${diff.toFixed(0)}</div>`;
        } else {
            html += `<div class="diff-cell negative">${diff.toFixed(0)}</div>`;
        }
    }
    html += `</div>`;

    // ── Vorjahr ──
    html += `<div class="year-block">`;
    html += `<div class="year-summary">
        <div class="year-label">${year_prev}</div>
        <div class="year-total">Gesamt: <strong>${sumPrev.toFixed(0)} km</strong></div>
    </div>`;
    html += `<div class="bars-row">`;
    for (let i = 0; i < 12; i++) {
        const km = prev[i];
        const heightPct = km > 0 ? (km / maxKm * 100) : 0;
        const label = km > 0 ? `${km.toFixed(0)}` : "";
        html += `<div class="bar-col">
            <div class="bar-fill prev" style="height:${heightPct}%;" title="${MONTHS[i]}: ${km} km"></div>
            <div class="bar-km">${label}</div>
        </div>`;
    }
    html += `</div></div>`;

    // ── Monatsbezeichnungen ──
    html += `<div class="month-labels">`;
    MONTHS.forEach(m => {
        html += `<div class="month-label">${m}</div>`;
    });
    html += `</div>`;

    document.getElementById("chartContainer").innerHTML = html;
}

loadData()
    .then(buildChart)
    .catch(err => {
        document.getElementById("chartContainer").innerHTML =
            `<div style="color:#c0392b;">Fehler beim Laden: ${err.message}</div>`;
    });
</script>

</body>
</html>
