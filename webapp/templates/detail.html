<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Tour-Detail</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet" href="{{ url_for('pages.vendor_static', filename='leaflet/leaflet.css') }}">
    <script defer src="{{ url_for('pages.vendor_static', filename='leaflet/leaflet.js') }}"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        #mainLayout {
            display: block !important;
            width: 100% !important;
        }

        #leftColumn {
            width: 100% !important;
            max-width: 100% !important;
        }

        #map {
            height: 620px;
            min-height: 620px;
            width: calc(100% - 20px);
            margin-left: 10px;
            margin-right: 10px;
        }

        #elevationChart {
            width: calc(100% - 20px);
            margin-left: 10px;
            margin-right: 10px;
            height: 180px;
            margin-top: 12px;
        }

        #elevationChart canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .tour-metrics-line {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            background: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            margin-bottom: 12px;
            border-left: 4px solid #4B77BE;
        }

        .metric-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .metric-label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }

        .metric-value {
            font-size: 15px;
            color: #1C3F75;
            font-weight: 600;
        }

        .bike-select {
            min-width: 180px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #c0d3e9;
            background-color: #f9fbfd;
            color: #1C3F75;
            font-size: 14px;
            outline: none;
        }
    </style>
</head>
<body>

    <div style="margin-bottom: 15px;">
        <a href="{{ url_for('pages.index') }}" class="btn-secondary" style="text-decoration: none; font-size: 14px;">← Zurück zum Dashboard</a>
    </div>

    <div class="tour-metrics-line">
        <div class="metric-item">
            <span class="metric-label">Name:</span>
            <span
                id="tourNameValue"
                class="metric-value"
                title="Doppelklick zum Bearbeiten"
                data-tour-id="{{ tour.id }}"
                tabindex="0"
            >{{ tour.name }}</span>
        </div>
        <div class="metric-item" style="margin-left: 10px; padding-left: 14px; border-left: 1px solid #eee;">
            <span class="metric-label">Datum:</span>
            <span class="metric-value">{{ tour.date_display }}</span>
        </div>
        <div class="metric-item" style="margin-left: 10px; padding-left: 14px; border-left: 1px solid #eee;">
            <span class="metric-label">Dauer:</span>
            <span class="metric-value">{{ tour.duration_hm }} h</span>
        </div>
        <div class="metric-item" style="margin-left: 10px; padding-left: 14px; border-left: 1px solid #eee;">
            <span class="metric-label">Distanz:</span>
            <span class="metric-value">{{ (tour.distance_km | float) | round(0, 'common') | int }} km</span>
        </div>
        <div class="metric-item" style="margin-left: 10px; padding-left: 14px; border-left: 1px solid #eee;">
            <span class="metric-label">Aufstieg:</span>
            <span class="metric-value">{{ (tour.total_ascent_m | float) | round(0, 'common') | int }} hm</span>
        </div>
        <div class="metric-item" style="margin-left: 10px; padding-left: 14px; border-left: 1px solid #eee;">
            <span class="metric-label">Bike:</span>
            <select
                id="tourBikeSelect"
                class="bike-select"
                data-tour-id="{{ tour.id }}"
            >
                <option value="" {% if not selected_bike_id %}selected{% endif %}>no Bike</option>
                {% for bike in bikes %}
                    <option value="{{ bike.id }}" {% if selected_bike_id == bike.id %}selected{% endif %}>{{ bike.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="metric-item" style="margin-left: auto;">
            <a
                id="btnGpxDownload"
                href="/api/tours/{{ tour.id }}/gpx"
                download
                style="
                    display: inline-block;
                    padding: 6px 14px;
                    background: #1f4e8c;
                    color: #fff;
                    border-radius: 6px;
                    font-size: 13px;
                    font-weight: 600;
                    text-decoration: none;
                    white-space: nowrap;
                "
            >⬇ GPX Download</a>
        </div>
    </div>

    <div id="mainLayout">
        <div id="map"></div>
        <div id="elevationChart">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
    window.onload = function() {
        const coords = {{ tour.coords|tojson }};
        const hasCoords = coords.length > 0;

        const map = L.map("map");
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "&copy; OpenStreetMap contributors"
        }).addTo(map);

        if (!hasCoords) {
            setTimeout(() => map.invalidateSize(), 0);
        } else {
            let drawCoords = coords;
            const maxPoints = 5000;

            if (coords.length > maxPoints) {
                const step = Math.ceil(coords.length / maxPoints);
                const reduced = [];

                for (let i = 0; i < coords.length; i += step) {
                    reduced.push(coords[i]);
                }

                const last = coords[coords.length - 1];
                if (
                    reduced.length === 0 ||
                    reduced[reduced.length - 1][0] !== last[0] ||
                    reduced[reduced.length - 1][1] !== last[1]
                ) {
                    reduced.push(last);
                }

                drawCoords = reduced;
            }

            const elevationData = drawCoords.map(p => p[2]);
            const labels = drawCoords.map((_, index) => index);

            const ctx = document.getElementById("myChart").getContext("2d");
            new Chart(ctx, {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Höhe (m)",
                        data: elevationData,
                        borderColor: "#4B77BE",
                        backgroundColor: "rgba(75, 119, 190, 0.2)",
                        fill: true,
                        borderWidth: 2,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        y: {
                            beginAtZero: false,
                            title: { display: true, text: "Höhe in Metern" }
                        }
                    }
                }
            });

            const poly = L.polyline(drawCoords, { weight: 4 }).addTo(map);

            setTimeout(() => {
                map.invalidateSize();
                map.fitBounds(poly.getBounds(), { padding: [20, 20] });
            }, 0);
        }

        const tourNameEl = document.getElementById("tourNameValue");
        const bikeSelectEl = document.getElementById("tourBikeSelect");

        if (bikeSelectEl) {
            let previousBikeValue = bikeSelectEl.value;

            bikeSelectEl.addEventListener("change", async () => {
                const selectedValue = bikeSelectEl.value;
                bikeSelectEl.disabled = true;

                try {
                    const response = await fetch(`/api/tours/${bikeSelectEl.dataset.tourId}/bike`, {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            bike_id: selectedValue === "" ? null : Number(selectedValue)
                        })
                    });

                    const result = await response.json();

                    if (!response.ok || result.status !== "ok") {
                        throw new Error(result.message || "Speichern fehlgeschlagen.");
                    }

                    previousBikeValue = selectedValue;
                } catch (error) {
                    alert(error.message || "Die Bike-Zuordnung konnte nicht gespeichert werden.");
                    bikeSelectEl.value = previousBikeValue;
                } finally {
                    bikeSelectEl.disabled = false;
                }
            });
        }

        if (!tourNameEl) {
            return;
        }

        let originalName = tourNameEl.textContent.trim();
        let isEditing = false;
        let isSaving = false;

        function placeCaretAtEnd(el) {
            const range = document.createRange();
            const selection = window.getSelection();
            range.selectNodeContents(el);
            range.collapse(false);
            selection.removeAllRanges();
            selection.addRange(range);
        }

        function startEditing() {
            if (isEditing || isSaving) {
                return;
            }

            isEditing = true;
            originalName = tourNameEl.textContent.trim();
            tourNameEl.contentEditable = "true";
            tourNameEl.focus();
            placeCaretAtEnd(tourNameEl);
        }

        async function saveName() {
            if (!isEditing || isSaving) {
                return;
            }

            const newName = tourNameEl.textContent.trim();

            if (!newName) {
                tourNameEl.textContent = originalName;
                tourNameEl.contentEditable = "false";
                isEditing = false;
                return;
            }

            if (newName === originalName) {
                tourNameEl.contentEditable = "false";
                isEditing = false;
                return;
            }

            isSaving = true;

            try {
                const response = await fetch(`/api/tours/${tourNameEl.dataset.tourId}/name`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ name: newName })
                });

                const result = await response.json();

                if (!response.ok || result.status !== "ok") {
                    throw new Error(result.message || "Speichern fehlgeschlagen.");
                }

                originalName = result.name;
                tourNameEl.textContent = result.name;

                localStorage.setItem("tour_name_updated", JSON.stringify({
                    tourId: Number(result.tour_id),
                    name: result.name,
                    updatedAt: Date.now()
                }));
            } catch (error) {
                alert(error.message || "Der Tourname konnte nicht gespeichert werden.");
                tourNameEl.textContent = originalName;
            } finally {
                tourNameEl.contentEditable = "false";
                isEditing = false;
                isSaving = false;
            }
        }

        function cancelEditing() {
            if (!isEditing || isSaving) {
                return;
            }

            tourNameEl.textContent = originalName;
            tourNameEl.contentEditable = "false";
            isEditing = false;
        }

        tourNameEl.addEventListener("dblclick", (event) => {
            event.preventDefault();
            startEditing();
        });

        tourNameEl.addEventListener("keydown", async (event) => {
            if (!isEditing) {
                return;
            }

            if (event.key === "Enter") {
                event.preventDefault();
                await saveName();
                tourNameEl.blur();
            } else if (event.key === "Escape") {
                event.preventDefault();
                cancelEditing();
                tourNameEl.blur();
            }
        });

        tourNameEl.addEventListener("blur", async () => {
            await saveName();
        });
    };
    </script>
</body>
</html>
